<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Teste Supabase</title>
</head>
<body>

  <h2>Teste de Conexão com Supabase</h2>
  <div id="resultado">Buscando dados...</div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    // 🔐 CONFIGURAÇÃO
    const URL = 'https://undfphhyptxskeuffoqt.supabase.co'
    const KEY = 'sb_publishable_HJY9SONBEzOh4i4wSm-MgQ_2k7dh0hG'

    const db = createClient(URL, KEY)

    async function buscarCards() {
      try {
        const { data, error } = await db
          .from('cards')
          .select('*')
          .limit(3)

        console.log('DATA:', data)
        console.log('ERROR:', error)

        if (error) {
          document.getElementById('resultado').innerText =
            'ERRO: ' + error.message
          return
        }

        if (!data || data.length === 0) {
          document.getElementById('resultado').innerText =
            'Nenhum dado encontrado (verifique RLS/policy)'
          return
        }

        // ⚠️ Ajuste aqui o nome da coluna se necessário
        const html = data.map(card => {
          return `<p><b>Pergunta:</b> ${card.Side1 ?? 'campo Side1 não encontrado'}</p>`
        }).join('')

        document.getElementById('resultado').innerHTML = html

      } catch (err) {
        console.error('Erro geral:', err)
        document.getElementById('resultado').innerText =
          'ERRO GERAL: ' + err.message
      }
    }

    buscarCards()
  </script>

</body>
</html>
