<!DOCTYPE html>
<html>
<head>
    <title>Teste Supabase</title>
    <!-- A mágica: A biblioteca do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Teste de Conexão...</h2>
    <div id="resultado">Buscando dados...</div>

    <script>
    const URL_DO_PROJETO = 'https://undfpphyptxskeuffoqt.supabase.co'; 
    const CHAVE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuZGZwaGh5cHR4c2tldWZmb3F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTIzMTMsImV4cCI6MjA5MjI2ODMxM30.go7_zSrrDzXsGvE3hgbIbpD9mwxCzd_PkD8ec2R6ADs'; 

    // Agora é 'db' em vez de 'supabase'
    const db = supabase.createClient(URL_DO_PROJETO, CHAVE_ANON);

    async function buscarCards() {
        // Aqui também é 'db'
        const { data, error } = await db
            .from('cards')
            .select('*')
            .limit(3); 

        if (error) {
            document.getElementById('resultado').innerText = 'ERRO: ' + error.message;
        } else {
            let textoNaTela = '';
            data.forEach(card => {
                textoNaTela += '<br><b>Pergunta:</b> ' + card.Side1;
            });
            document.getElementById('resultado').innerHTML = textoNaTela;
        }
    }

    buscarCards();
</script>
</body>
</html>
